environments:
  - environment: develop
    aws_region: us-east-1
    iam_role_plan: arn:aws:iam::559744160976:role/github-oidc-auth-develop-github-actions-role
    iam_role_apply: arn:aws:iam::559744160976:role/github-oidc-auth-develop-github-actions-role

  # - environment: staging
  #   aws_region: ap-northeast-1
  #   iam_role_plan: arn:aws:iam::123456789012:role/terragrunt-plan-staging-role
  #   iam_role_apply: arn:aws:iam::123456789012:role/terragrunt-apply-staging-role

  - environment: production
    aws_region: ap-northeast-1
    iam_role_plan: arn:aws:iam::559744160976:role/github-oidc-auth-production-github-actions-role
    iam_role_apply: arn:aws:iam::559744160976:role/github-oidc-auth-production-github-actions-role

# NOTE: Do NOT add "kubernetes/manifests/**" as a root here.
# The kubernetes-hydrator workflow auto-commits to that path with a
# GitHub App token. If label-dispatcher matches it, the resulting
# label flips re-trigger deploy-trigger, which re-runs hydrate, which
# pushes again — an infinite loop. Keep kubernetes/manifests/** outside
# of directory_conventions.
directory_conventions:
  - root: "aws/{service}"
    stacks:
      - name: terragrunt
        directory: "envs/{environment}"

  - root: "github/{service}"
    stacks:
      - name: terragrunt
        directory: "envs/{environment}"

  - root: "kubernetes/components/{service}"
    stacks:
      - name: kubernetes
        directory: "{environment}"
