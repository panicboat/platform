# =============================================================================
# Flux GitRepository + Kustomization for panicboat/monorepo
# =============================================================================
# monorepo は clusters/production/ 配下に各 service ごとの Flux Kustomization を
# 内蔵 (= monolith / frontend)、cascading で deploy される設計のため、本 platform
# stack からは monorepo を 1 つの GitRepository として pull し、root Kustomization
# のみ管理する。
# =============================================================================
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: monorepo
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/panicboat/monorepo.git
  ref:
    branch: main
  provider: github
  secretRef:
    name: panicboat-github-app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monorepo-cluster
  namespace: flux-system
spec:
  interval: 5m0s
  path: "./clusters/production"
  prune: true
  sourceRef:
    kind: GitRepository
    name: monorepo
  suspend: false  # active; flip to `true` to halt monorepo Kustomization
---
# =============================================================================
# ExternalSecret: Sync GitHub App credentials from AWS Secrets Manager
# =============================================================================
# AWS Secrets Manager の `panicboat/github-app/panicboat` から App
# credentials (appID / installationID / privateKey) を flux-system の K8s
# Secret として sync し、GitRepository monorepo の write 認証に使う。
# AWS Secrets Manager 内の secret は user が console で 1 回手動で put した
# 既存 panicboat App の credentials (Contents: Read & Write 権限あり)。
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: panicboat-github-app
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: panicboat-github-app
    creationPolicy: Owner
  data:
    - secretKey: githubAppID
      remoteRef:
        key: panicboat/github-app/panicboat
        property: app_id
    - secretKey: githubAppInstallationID
      remoteRef:
        key: panicboat/github-app/panicboat
        property: installation_id
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: panicboat/github-app/panicboat
        property: private_key
