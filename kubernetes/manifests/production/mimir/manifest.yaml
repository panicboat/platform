# Source: mimir-distributed/templates/mimir-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-distributed-config
  labels:
    helm.sh/chart: mimir-distributed-6.0.6
    app.kubernetes.io/name: mimir
    app.kubernetes.io/instance: mimir-distributed
    app.kubernetes.io/version: "3.0.4"
    app.kubernetes.io/managed-by: Helm
  namespace: "monitoring"
data:
  mimir.yaml: |
    
    activity_tracker:
      filepath: /active-query-tracker/activity.log
    alertmanager:
      data_dir: /data
      enable_api: true
      external_url: /alertmanager
      fallback_config_file: /configs/alertmanager_fallback_config.yaml
    blocks_storage:
      backend: s3
      bucket_store:
        chunks_cache:
          backend: memcached
          memcached:
            addresses: dnssrvnoa+mimir-distributed-chunks-cache.monitoring.svc.cluster.local.:11211
            max_idle_connections: 150
            max_item_size: 1048576
            timeout: 750ms
        sync_dir: /data/tsdb-sync
      s3:
        bucket_name: mimir-559744160976
        endpoint: s3.ap-northeast-1.amazonaws.com
        region: ap-northeast-1
      storage_prefix: production
      tsdb:
        dir: /data/tsdb
        head_compaction_interval: 15m
        wal_replay_concurrency: 3
    common:
      storage:
        backend: s3
        s3:
          bucket_name: mimir-559744160976
          endpoint: s3.ap-northeast-1.amazonaws.com
          region: ap-northeast-1
    compactor:
      compaction_interval: 30m
      data_dir: /data
      deletion_delay: 2h
      first_level_compaction_wait_period: 25m
      max_closing_blocks_concurrency: 2
      max_opening_blocks_concurrency: 4
      sharding_ring:
        heartbeat_period: 1m
        heartbeat_timeout: 4m
        wait_stability_min_duration: 1m
      symbols_flushers_concurrency: 4
    distributor:
      remote_timeout: 5s
      ring:
        heartbeat_period: 1m
        heartbeat_timeout: 4m
    frontend:
      parallelize_shardable_queries: true
      scheduler_address: mimir-distributed-query-scheduler-headless.monitoring.svc:9095
    frontend_worker:
      grpc_client_config:
        max_send_msg_size: 419430400
      scheduler_address: mimir-distributed-query-scheduler-headless.monitoring.svc:9095
    ingest_storage:
      enabled: false
      kafka:
        auto_create_topic_default_partitions: 100
        auto_create_topic_enabled: true
        topic: mimir-ingest
    ingester:
      push_grpc_method_enabled: true
      ring:
        final_sleep: 0s
        heartbeat_period: 2m
        heartbeat_timeout: 10m
        num_tokens: 512
        tokens_file_path: /data/tokens
        unregister_on_shutdown: false
    ingester_client:
      grpc_client_config:
        max_recv_msg_size: 104857600
        max_send_msg_size: 104857600
    limits:
      max_cache_freshness: 10m
      max_query_parallelism: 240
      max_total_query_length: 12000h
    memberlist:
      abort_if_cluster_join_fails: false
      compression_enabled: false
      join_members:
      - dns+mimir-distributed-gossip-ring.monitoring.svc.cluster.local.:7946
    multitenancy_enabled: false
    querier:
      max_concurrent: 16
    query_scheduler:
      max_outstanding_requests_per_tenant: 800
    ruler:
      alertmanager_url: dnssrvnoa+http://_http-metrics._tcp.mimir-distributed-alertmanager-headless.monitoring.svc.cluster.local./alertmanager
      enable_api: true
      rule_path: /data
    runtime_config:
      file: /var/mimir/runtime.yaml
    store_gateway:
      sharding_ring:
        heartbeat_period: 1m
        heartbeat_timeout: 10m
        tokens_file_path: /data/tokens
        unregister_on_shutdown: false
        wait_stability_min_duration: 1m
    usage_stats:
      installation_mode: helm
