---
# Source: beyla/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: beyla
  namespace: monitoring
  labels:
    helm.sh/chart: beyla-1.16.7
    app.kubernetes.io/name: beyla
    app.kubernetes.io/instance: beyla
    app.kubernetes.io/version: "3.14.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: beyla
    app.kubernetes.io/component: config
data:
  beyla-config.yml: |
    attributes:
      kubernetes:
        enable: true
      select:
        '*':
          exclude:
          - k8s_container_name
          - k8s_kind
          - k8s_owner_name
          - k8s_pod_start_time
          - k8s_pod_uid
          - k8s_replicaset_name
    discovery:
      exclude_instrument:
      - k8s_deployment_name: monolith
      instrument:
      - k8s_namespace: default
    filter:
      network:
        k8s_dst_owner_name:
          not_match: '{kube*,*prometheus*,*grafana*,*mimir*,*loki*,*tempo*}'
        k8s_src_owner_name:
          not_match: '{kube*,*prometheus*,*grafana*,*mimir*,*loki*,*tempo*}'
    otel_traces_export:
      endpoint: http://opentelemetry-collector.monitoring.svc.cluster.local:4317
      interval: 5s
      max_export_batch_size: 512
      protocol: grpc
    prometheus_export:
      path: /metrics
      port: 9090
    routes:
      unmatched: heuristic

