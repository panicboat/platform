---
# =============================================================================
# gp3 StorageClass (EBS CSI driver)
# =============================================================================
# AWS EBS gp3 volume type を provision するための StorageClass。
# EKS default の gp2 (in-tree provisioner) ではなく、ebs.csi.aws.com
# (out-of-tree CSI driver) を使う。Phase 3 Sub-project 2 の Mimir / Prometheus /
# Grafana / Alertmanager PVC が `storageClassName: gp3` を要求するため必須。
#
# Parameters:
#   - type: gp3 (cost/performance 比で gp2 より優位、AWS デフォルト推奨)
#   - encrypted: true (rest-at-encryption、SSE-EBS)
#   - fsType: ext4
#
# WaitForFirstConsumer: Pod の zone-affinity に合わせて EBS volume を生成し、
# AZ mismatch を防ぐ (multi-AZ cluster の必須設定)。
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  fsType: ext4
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
