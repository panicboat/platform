---
# =============================================================================
# ExternalDNS Namespace
# =============================================================================
# This namespace contains the ExternalDNS controller. Chart default name is
# also `external-dns`; we follow that convention.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    app.kubernetes.io/name: external-dns
---
# =============================================================================
# Karpenter Namespace
# =============================================================================
# This namespace contains the Karpenter controller. Chart default name is
# also `karpenter`; we follow that convention.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: karpenter
  labels:
    app.kubernetes.io/name: karpenter
---
# =============================================================================
# KEDA Namespace
# =============================================================================
# This namespace contains:
#   - keda-operator (controller for ScaledObject / ScaledJob / TriggerAuthentication)
#   - keda-operator-metrics-apiserver (external metrics API server)
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: keda
  labels:
    app.kubernetes.io/name: keda
