---
# =============================================================================
# cert-manager Namespace
# =============================================================================
# cert-manager controller / cainjector / webhook の専用 namespace。
# admission webhook cert の自動発行基盤として ESO + Cilium Hubble TLS の cert 発行に使用。
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/name: cert-manager
---
# =============================================================================
# ExternalDNS Namespace
# =============================================================================
# This namespace contains the ExternalDNS controller. Chart default name is
# also `external-dns`; we follow that convention.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: external-dns
  labels:
    app.kubernetes.io/name: external-dns
---
# =============================================================================
# external-secrets Namespace
# =============================================================================
# External Secrets Operator (controller / cert-controller / webhook) の専用 namespace。
# AWS Secrets Manager から K8s Secret への sync 基盤。
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    app.kubernetes.io/name: external-secrets
---
# =============================================================================
# Karpenter Namespace
# =============================================================================
# This namespace contains the Karpenter controller. Chart default name is
# also `karpenter`; we follow that convention.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: karpenter
  labels:
    app.kubernetes.io/name: karpenter
---
# =============================================================================
# KEDA Namespace
# =============================================================================
# This namespace contains:
#   - keda-operator (controller for ScaledObject / ScaledJob / TriggerAuthentication)
#   - keda-operator-metrics-apiserver (external metrics API server)
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: keda
  labels:
    app.kubernetes.io/name: keda
---
# =============================================================================
# Monitoring Namespace
# =============================================================================
# This namespace contains the full observability stack:
#   - Prometheus (metrics)
#   - Grafana (visualization)
#   - Alertmanager (alerting)
#   - Loki (logs)
#   - Tempo (traces)
#   - Beyla (eBPF instrumentation)
#   - Fluent-bit (log collection)
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/name: monitoring
---
# =============================================================================
# reloader Namespace
# =============================================================================
# Stakater Reloader (= reloader-controller) の専用 namespace。
# Secret / ConfigMap 変更時に annotation 付きの Deployment / StatefulSet を auto-rollout する。
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: reloader
  labels:
    app.kubernetes.io/name: reloader
