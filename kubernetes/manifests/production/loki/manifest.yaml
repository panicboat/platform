apiVersion: v1
kind: ConfigMap
metadata:
  name: loki
  namespace: monitoring
  labels:
    helm.sh/chart: loki-13.6.0
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: "3.7.1"
data:
  config.yaml: |
    
    auth_enabled: false
    bloom_build:
      builder:
        planner_address: ""
      enabled: false
    bloom_gateway:
      client:
        addresses: ""
      enabled: false
    common:
      compactor_grpc_address: 'loki.monitoring.svc.cluster.local:9095'
      path_prefix: /var/loki
      replication_factor: 1
      storage:
        s3:
          bucketnames: ""
          insecure: false
          region: ap-northeast-1
          s3forcepathstyle: false
    compactor:
      retention_delete_delay: 2h
      retention_enabled: true
    frontend:
      scheduler_address: ""
      tail_proxy_url: ""
    frontend_worker:
      scheduler_address: ""
    index_gateway:
      mode: simple
    ingester:
      chunk_idle_period: 2m
      max_chunk_age: 5m
      wal:
        flush_on_shutdown: true
    limits_config:
      ingestion_burst_size_mb: 6
      ingestion_rate_mb: 4
      max_cache_freshness_per_query: 10m
      query_timeout: 300s
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      retention_period: 720h
      split_queries_by_interval: 15m
      volume_enabled: true
    memberlist:
      abort_if_cluster_join_fails: true
      advertise_addr: ${HASH_RING_INSTANCE_ADDR}
      advertise_port: 7946
      bind_port: 7946
      join_members:
      - loki-memberlist.monitoring.svc.cluster.local
      max_join_backoff: 1m
      max_join_retries: 10
      min_join_backoff: 1s
      rejoin_interval: 90s
    pattern_ingester:
      enabled: false
    query_range:
      align_queries_with_step: true
    ruler:
      storage:
        s3:
          bucketnames: loki-559744160976
          insecure: false
          region: ap-northeast-1
          s3forcepathstyle: false
        type: s3
      wal:
        dir: /var/loki/ruler-wal
    runtime_config:
      file: /etc/loki/runtime-config/runtime-config.yaml
    schema_config:
      configs:
      - from: "2024-01-01"
        index:
          period: 24h
          prefix: production_index_
        object_store: s3
        schema: v13
        store: tsdb
    server:
      graceful_shutdown_timeout: 5s
      grpc_listen_port: 9095
      grpc_server_max_concurrent_streams: 1000
      grpc_server_max_recv_msg_size: 104857600
      grpc_server_max_send_msg_size: 104857600
      grpc_server_min_time_between_pings: 10s
      grpc_server_ping_without_stream_allowed: true
      http_listen_port: 3100
      http_server_idle_timeout: 30s
      http_server_read_timeout: 10m0s
      http_server_write_timeout: 10m0s
      log_level: info
    storage_config:
      aws:
        bucketnames: loki-559744160976
        region: ap-northeast-1
        s3forcepathstyle: false
      bloom_shipper:
        working_directory: /var/loki/data/bloomshipper
      boltdb_shipper:
        index_gateway_client:
          server_address: ""
      hedging:
        at: 250ms
        max_per_second: 20
        up_to: 3
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-index
        cache_location: /var/loki/tsdb-cache
        index_gateway_client:
          server_address: ""
        shared_store: s3
      use_thanos_objstore: false
    tracing:
      enabled: false
