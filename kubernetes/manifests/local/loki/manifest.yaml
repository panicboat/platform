          emptyDir: {}
      containers:
        - name: loki
          image: docker.io/grafana/loki:3.7.1
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/config/config.yaml
            - -config.expand-env=true
            - -target=all
          ports:
            - name: http-metrics
