# =============================================================================
# hostPort Patch for OpenTelemetry Collector
# =============================================================================
# Adds hostPort so Beyla (a hostNetwork pod) can connect to the OTel
# Collector via localhost:4317 on k3d.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-collector
  namespace: opentelemetry-system
spec:
  template:
    spec:
      containers:
        - name: opentelemetry-collector
          ports:
            - name: otlp
              containerPort: 4317
              hostPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              hostPort: 4318
              protocol: TCP
