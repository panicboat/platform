# =============================================================================
# Ingress: monitoring-uis (application IngressGroup)
# =============================================================================
# 4 Ingresses (= grafana / hubble / alertmanager / prometheus) が IngressGroup
# `application` で application Ingress と同一 ALB を共有。各 Ingress の backend は
# per-host の oauth2-proxy release Service (= `oauth2-proxy-{grafana,hubble,
# alertmanager,prometheus}`、各々 1 upstream へ reverse-proxy)。ALB が host header
# から Service を選択 → oauth2-proxy が Google OAuth 認証 + 単一 backend へ転送。
#
# ACM cert auto-discovery: ALB Controller は wildcard cert *.panicboat.net を
# 自動的に attach する (= Ingress.host が SAN にマッチ)。explicit
# certificate-arn annotation は不要。
#
# external-dns annotation: hostname を Route53 record として自動作成
# (= aws-load-balancer-controller / external-dns 連携)。
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-uis-grafana
  namespace: oauth2-proxy
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/group.name: application
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /ping
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    external-dns.alpha.kubernetes.io/hostname: grafana.panicboat.net
spec:
  ingressClassName: alb
  rules:
    - host: grafana.panicboat.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-grafana
                port:
                  number: 80
---
