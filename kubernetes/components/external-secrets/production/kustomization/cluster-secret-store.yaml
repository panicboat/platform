# =============================================================================
# AWS Secrets Manager ClusterSecretStore
# =============================================================================
# cluster 全 namespace から参照可能な共有 SecretStore。
# EKS Pod Identity Association 経由で AWS Secrets Manager (= ap-northeast-1) に access。
# NOTE: EKS Pod Identity では auth block 不要 (= credentials が pod に自動 attach)。
# ESO v2.x では apiVersion: external-secrets.io/v1 (= v1beta1 から v1 に昇格)。
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-1
