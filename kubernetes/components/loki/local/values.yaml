# Loki Log Aggregation Configuration for local
# Production-ready base configuration with local-specific overrides

# =============================================================================
# Deployment Mode
# =============================================================================
# NOTE: chart key "SingleBinary" is deprecated in grafana-community/loki v13;
# the canonical name is "Monolithic".
deploymentMode: Monolithic

# =============================================================================
# Loki Configuration
# =============================================================================
loki:
  # Disable multi-tenancy for simplicity in local
  auth_enabled: false

  # -------------------------------------------------------------------------
  # Common Configuration
  # -------------------------------------------------------------------------
  commonConfig:
    replication_factor: 1

  # -------------------------------------------------------------------------
  # Storage Configuration
  # -------------------------------------------------------------------------
  storage:
    # Example for S3:
    #   type: s3
    #   s3:
    #     endpoint: s3.amazonaws.com
    #     region: ap-northeast-1
    #     bucketnames: loki-logs
    type: 'filesystem'

  # -------------------------------------------------------------------------
  # Schema Configuration
  # -------------------------------------------------------------------------
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  # -------------------------------------------------------------------------
  # Pattern Ingester
  # -------------------------------------------------------------------------
  pattern_ingester:
    enabled: true

  # -------------------------------------------------------------------------
  # Limits Configuration
  # -------------------------------------------------------------------------
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    # OTLP configuration for receiving logs from OpenTelemetry Collector
    otlp_config:
      resource_attributes:
        attributes_config:
          - action: index_label
            attributes:
              - k8s.namespace.name
              - k8s.pod.name
              - k8s.container.name
              - service.name

# =============================================================================
# Single Binary Mode Configuration
# =============================================================================
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# =============================================================================
# Gateway
# =============================================================================
gateway:
  enabled: false

# =============================================================================
# Cache Configuration
# =============================================================================
# NOTE: grafana-community/loki v13 では snake_case の results_cache は camelCase の
# resultsCache に変更された
resultsCache:
  enabled: false

chunksCache:
  enabled: false

# =============================================================================
# Disable Other Components (for SingleBinary mode)
# =============================================================================
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# =============================================================================
# Monitoring
# =============================================================================
# NOTE: grafana-community/loki v13 では monitoring.selfMonitoring セクションは削除された
monitoring:
  serviceMonitor:
    enabled: true
