# =============================================================================
# reloader Helmfile for production
# =============================================================================
# Stakater Reloader の deploy。passive watcher、admission webhook 不在のため
# 1 replica で十分。
# =============================================================================
environments:
  production:
---
repositories:
  - name: stakater
    url: https://stakater.github.io/stakater-charts

# helmfile template (= scripts/kubernetes-hydrate/hydrate-component.sh) 用の workaround。
# Stakater Reloader chart の ServiceMonitor template は
# `.Capabilities.APIVersions.Has "monitoring.coreos.com/v1"` で gate されており、
# offline render 時に CRD が見えず ServiceMonitor が skip される。
# 本 args は `helm template` にのみ valid (= helm upgrade/install には unknown flag)、
# 現運用 (= Flux GitOps で hydrated manifest を apply) では問題なし。
# helmfile apply/sync を直接実行する運用に切り替える場合は要再検討。
helmDefaults:
  args:
    - "--api-versions=monitoring.coreos.com/v1"

releases:
  - name: reloader
    namespace: reloader
    chart: stakater/reloader
    version: "2.2.14"
    values:
      - values.yaml.gotmpl
