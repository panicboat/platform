# Metrics Server values for production
# Reference: docs/superpowers/specs/2026-05-03-eks-production-foundation-addons-alpha-design.md

# =============================================================================
# defaultArgs override
# =============================================================================
# chart の defaultArgs を上書きして --kubelet-preferred-address-types を
# InternalIP のみに narrow する。EKS の kubelet は InternalIP で待ち受けるため
# preference list を 1 つに絞ることで明示的な制約を表す。
# defaultArgs を上書きすることで chart の args ロジック（defaultArgs に args を
# append する仕様）による flag 重複を避ける。
defaultArgs:
  - --cert-dir=/tmp
  - --kubelet-preferred-address-types=InternalIP
  - --kubelet-use-node-status-port
  - --metric-resolution=15s

# =============================================================================
# Resources
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# =============================================================================
# Replicas
# =============================================================================
# single replica。Metrics Server は state を持たないので軽微な再起動 gap を許容する。
# HA 化は trade-off を再評価した上で Future Specs。
replicas: 1
