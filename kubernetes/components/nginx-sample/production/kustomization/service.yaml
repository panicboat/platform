# =============================================================================
# nginx ClusterIP Service for end-to-end validation
# =============================================================================
# nginx Pod を cluster 内 + ALB Ingress backend として expose。
# port 80 → targetPort http (= containerPort 80) の標準 mapping。
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
spec:
  type: ClusterIP
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
