# =============================================================================
# nginx Deployment for end-to-end validation
# =============================================================================
# Demo application that exercises the full platform: serves the plain nginx
# Welcome page; injects env var DEMO_MESSAGE from a K8s Secret synced from
# AWS Secrets Manager; uses a Reloader annotation for auto-rollout on Secret
# change; scaled by a KEDA ScaledObject (cpu + prometheus multi-trigger);
# auto-instrumented for traces + metrics by Beyla eBPF.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: default
  labels:
    app: nginx
  annotations:
    # Reloader watches K8s Secret nginx-demo and triggers a Pod auto-rollout
    # when the Secret changes.
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: DEMO_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: nginx-demo
                  key: message
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
