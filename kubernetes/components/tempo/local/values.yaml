# Tempo Distributed Tracing Backend Configuration for local
# Production-ready base configuration with local-specific overrides

# =============================================================================
# Tempo Configuration
# =============================================================================
tempo:
  repository: grafana/tempo
  tag: 2.6.1

  # Trace retention period
  retention: 24h

  # -------------------------------------------------------------------------
  # Receivers Configuration
  # -------------------------------------------------------------------------
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  # -------------------------------------------------------------------------
  # Storage Configuration
  # -------------------------------------------------------------------------
  storage:
    trace:
      # Example for S3:
      #   backend: s3
      #   s3:
      #     bucket: tempo-traces
      #     endpoint: s3.amazonaws.com
      #     region: ap-northeast-1
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal

  # -------------------------------------------------------------------------
  # Query Configuration
  # -------------------------------------------------------------------------
  query_frontend:
    search:
      max_duration: 0s

  # -------------------------------------------------------------------------
  # Metrics Generator (for trace-to-metrics)
  # -------------------------------------------------------------------------
  # NOTE: Helm chart uses camelCase for top-level keys
  metricsGenerator:
    enabled: true
    remoteWriteUrl: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    registry:
      external_labels:
        source: tempo
        cluster: k8s-local
    processor:
      service_graphs:
        wait: 10s
        max_items: 10000
      span_metrics:
        enable_target_info: true

  # -------------------------------------------------------------------------
  # Overrides (required to enable metrics generator processors)
  # -------------------------------------------------------------------------
  overrides:
    defaults:
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics

# =============================================================================
# Persistence
# =============================================================================
persistence:
  enabled: true
  size: 5Gi

# =============================================================================
# Gateway
# =============================================================================
gateway:
  enabled: false

# =============================================================================
# ServiceMonitor for Prometheus
# =============================================================================
serviceMonitor:
  enabled: true

# =============================================================================
# Resource Limits
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
