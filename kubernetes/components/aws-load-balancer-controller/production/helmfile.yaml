# =============================================================================
# AWS Load Balancer Controller Helmfile for production
# =============================================================================
# Provisions ALBs from Ingress resources. IngressGroup `panicboat-platform`
# is used to share one ALB across multiple Ingresses, keeping the per-month
# ALB cost flat regardless of how many Ingresses participate, while still
# letting each Ingress own its own listener rules.
# =============================================================================
environments:
  production:
    # NOTE: helmfile v1.4 は親 helmfile.yaml.gotmpl の environments values を
    # 子 helmfile に auto-inherit しないため、ここで再定義する。RECREATE marker
    # convention は kubernetes/helmfile.yaml.gotmpl 参照。値は親 helmfile と同期。
    values:
      - cluster:
          # RECREATE: cd aws/vpc/envs/production && TG_TF_PATH=tofu terragrunt output -raw vpc_id
          vpcId: vpc-0acc2422c699031e4
          # STABLE: aws/eks/modules/addons.tf で deterministic 化済
          albControllerRoleArn: arn:aws:iam::559744160976:role/eks-production-alb-controller
---
repositories:
  - name: eks
    url: https://aws.github.io/eks-charts

releases:
  - name: aws-load-balancer-controller
    namespace: kube-system
    chart: eks/aws-load-balancer-controller
    version: "3.3.0"
    values:
      - values.yaml.gotmpl
