# =============================================================================
# Cilium Kustomization Overlay for local
# =============================================================================
# This kustomization adds additional resources to the Cilium Helm release:
#   - GatewayClass and Gateway for HTTP routing
#   - HTTPRoute for Hubble UI
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - gateway.yaml
  - hubble-ui
