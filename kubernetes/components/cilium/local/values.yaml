# Cilium CNI Configuration for local
# Production-ready base configuration with local-specific overrides

# =============================================================================
# Kube-proxy replacement
# =============================================================================
# Uses kubeProxyReplacement: true while kube-proxy is also running. This
# hybrid mode lets Gateway API work while kube-proxy provides iptables-based
# service routing as fallback for hostNetwork pods.
kubeProxyReplacement: true

# These values are specific to the local k3d cluster.
k8sServiceHost: k3d-k8s-local-server-0
k8sServicePort: 6443

# =============================================================================
# IPAM Configuration
# =============================================================================
ipam:
  operator:
    clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]

# =============================================================================
# Operator Configuration
# =============================================================================
operator:
  replicas: 1

# =============================================================================
# Gateway API (recommended for production)
# =============================================================================
gatewayAPI:
  enabled: true

# =============================================================================
# Socket Load Balancing
# Required for hostNetwork pods (Beyla) to reach ClusterIP services
# =============================================================================
socketLB:
  enabled: true

# =============================================================================
# Hubble Observability
# =============================================================================
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - http
    serviceMonitor:
      enabled: true

# =============================================================================
# DNS Proxy
# Required for proper DNS resolution from hostNetwork pods
# =============================================================================
dnsProxy:
  enabled: true

# =============================================================================
# Network Configuration
# =============================================================================
ipv6:
  enabled: false
enableIPv4Masquerade: true

# =============================================================================
# Prometheus Metrics
# =============================================================================
prometheus:
  enabled: true
  serviceMonitor:
    enabled: true
    # Required for helm template to work without prometheus-operator CRDs installed
    trustCRDsExist: true
