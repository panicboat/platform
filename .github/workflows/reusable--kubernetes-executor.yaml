name: 'Reusable - Kubernetes Executor'

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Target environment for hydration (e.g., k3d)'
      app-id:
        required: true
        type: string
        description: 'GitHub App ID for authentication'
    secrets:
      private-key:
        required: true
        description: 'GitHub App private key for authentication'

jobs:
  execute-kubernetes:
    name: 'Execute Kubernetes'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup aqua
        uses: aquaproj/aqua-installer@v4.0.0
        with:
          aqua_version: v2.48.2

      - name: Hydrate manifests
        run: make -C kubernetes hydrate ENV=${{ inputs.environment }}

      - name: Commit and push hydrated manifests
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(kubernetes/manifests/${{ inputs.environment }}): hydrate manifests'
          commit_options: '--signoff'
          file_pattern: 'kubernetes/manifests/${{ inputs.environment }}/'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Generate diff with dyff
        id: diff
        run: |
          ENV="${{ inputs.environment }}"
          MANIFEST_DIR="kubernetes/manifests/${ENV}"
          BODY="## Kubernetes Manifests Diff (\`${ENV}\`)"
          HAS_DIFF=false

          for file in "${MANIFEST_DIR}"/*.yaml; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            [ "$BASENAME" = "kustomization.yaml" ] && continue

            # Get main branch version (empty if file is new)
            git show "origin/main:${file}" > /tmp/base.yaml 2>/dev/null || : > /tmp/base.yaml

            FILE_DIFF=$(dyff between --omit-header /tmp/base.yaml "$file" 2>/dev/null || true)
            if [ -n "$FILE_DIFF" ]; then
              HAS_DIFF=true
              BODY="${BODY}

          <details>
          <summary><code>${BASENAME}</code></summary>

          \`\`\`
          ${FILE_DIFF}
          \`\`\`

          </details>"
            fi
          done

          if [ "$HAS_DIFF" = false ]; then
            echo "body=**No manifest changes** for \`${ENV}\`." >> "$GITHUB_OUTPUT"
          else
            printf '%s\n' "$BODY" > /tmp/pr-comment-body.md
            echo "body_file=/tmp/pr-comment-body.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Post PR comment
        if: steps.pr-info.outputs.number != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ steps.pr-info.outputs.number }}
          header: kubernetes-diff-${{ inputs.environment }}
          path: ${{ steps.diff.outputs.body_file || '' }}
          message: ${{ steps.diff.outputs.body || '' }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
