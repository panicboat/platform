name: 'Auto Label - Label Resolver'

on:
  pull_request:
    types: [labeled]
    branches:
      - '**'
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write # kubernetes-executor pushes hydrated manifests
  pull-requests: write

concurrency:
  group: deploy-trigger-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deploy-trigger:
    name: 'Deployment Trigger'
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.resolver.outputs.targets }}
      has-targets: ${{ steps.resolver.outputs.has-targets }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@v1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Label Resolver
        id: resolver
        uses: panicboat/deploy-actions/label-resolver@main
        with:
          repository: ${{ github.repository }}
          pr-number: ${{ steps.pr-info.outputs.number }}
          github-token: ${{ steps.app-token.outputs.token }}
          config-path: 'workflow-config.yaml'

  kubernetes-targets-group:
    name: 'Group Kubernetes Targets by Environment'
    needs: deploy-trigger
    if: |
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"kubernetes"')
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.group.outputs.environments }}
    steps:
      - name: Group by environment
        id: group
        env:
          TARGETS: ${{ needs.deploy-trigger.outputs.targets }}
        run: |
          set -euo pipefail
          grouped=$(echo "$TARGETS" | jq -c '
            [.[] | select(.stack == "kubernetes")]
            | group_by(.environment)
            | map({environment: .[0].environment, services: [.[].service]})
          ')
          echo "environments=$grouped" >> "$GITHUB_OUTPUT"

  deploy-kubernetes-hydrate:
    name: 'Hydrate Kubernetes (${{ matrix.env.environment }})'
    needs: kubernetes-targets-group
    strategy:
      matrix:
        env: ${{ fromJson(needs.kubernetes-targets-group.outputs.environments) }}
      fail-fast: false
    uses: panicboat/panicboat-actions/.github/workflows/reusable--kubernetes-hydrator.yaml@main
    with:
      environment: ${{ matrix.env.environment }}
      services: ${{ toJson(matrix.env.services) }}
      app-id: ${{ vars.APP_ID }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-terragrunt:
    name: 'Deploy Terragrunt (${{ matrix.target.service }}:${{ matrix.target.environment }})'
    needs: deploy-trigger
    if: |
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"terragrunt"')
    strategy:
      matrix:
        target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
      fail-fast: false
    uses: panicboat/panicboat-actions/.github/workflows/reusable--terragrunt-executor.yaml@main
    with:
      service-name: ${{ matrix.target.service }}
      environment: ${{ matrix.target.environment }}
      action-type: ${{ matrix.target.stack == 'terragrunt' && (github.event_name == 'pull_request' && 'plan' || 'apply') || '' }}
      iam-role: ${{ github.event_name == 'pull_request' && matrix.target.iam_role_plan || matrix.target.iam_role_apply }}
      aws-region: ${{ matrix.target.aws_region }}
      working-directory: ${{ matrix.target.working_directory }}
      app-id: ${{ vars.APP_ID }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deploy-kubernetes:
    name: 'Deploy Kubernetes (${{ matrix.target.service }}:${{ matrix.target.environment }})'
    needs: [deploy-trigger, deploy-kubernetes-hydrate]
    if: |
      needs.deploy-trigger.outputs.has-targets == 'true' &&
      contains(needs.deploy-trigger.outputs.targets, '"stack":"kubernetes"')
    strategy:
      matrix:
        target: ${{ fromJson(needs.deploy-trigger.outputs.targets) }}
        exclude:
          - target:
              stack: terragrunt
      fail-fast: false
    uses: panicboat/panicboat-actions/.github/workflows/reusable--kubernetes-builder.yaml@main
    with:
      service-name: ${{ matrix.target.service }}
      environment: ${{ matrix.target.environment }}
      path: kubernetes/manifests/${{ matrix.target.environment }}/${{ matrix.target.service }}
      app-id: ${{ vars.APP_ID }}
    secrets:
      private-key: ${{ secrets.APP_PRIVATE_KEY }}

  deployment-summary:
    name: 'Deployment Summary'
    needs: [deploy-trigger, deploy-terragrunt, deploy-kubernetes-hydrate, deploy-kubernetes]
    if: always() && needs.deploy-trigger.outputs.has-targets == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "📊 Deployment Summary"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Environment: ${{ needs.deploy-trigger.outputs.target-environment }}"
          echo "Safety Status: ${{ needs.deploy-trigger.outputs.safety-status }}"
          echo "Targets: ${{ needs.deploy-trigger.outputs.targets }}"
          echo "Terragrunt Job Status: ${{ needs.deploy-terragrunt.result }}"
          echo "Kubernetes Job Status: ${{ needs.deploy-kubernetes.result }}"
          echo "Kubernetes Hydrate Job Status: ${{ needs.deploy-kubernetes-hydrate.result }}"
