name: 'Reusable - Kubernetes Builder'

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name for identification'
      environment:
        required: true
        type: string
        description: 'Target environment (e.g., local)'
      app-id:
        required: true
        type: string
        description: 'GitHub App ID for authentication'
      pr-number:
        required: true
        type: string
        description: 'Pull request number for posting kustomize diff comment'
    secrets:
      private-key:
        required: true
        description: 'GitHub App private key for authentication'

jobs:
  kustomize-diff:
    name: 'Kustomize Diff'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kustomize Diff
        uses: panicboat/panicboat-actions/kustomize-diff@f917fa0921e06ec7b08941df04958361c43253fb # main
        with:
          token: ${{ steps.app-token.outputs.token }}
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.environment }}
          path: kubernetes/manifests/${{ inputs.environment }}/${{ inputs.service-name }}
          pr-number: ${{ inputs.pr-number }}
