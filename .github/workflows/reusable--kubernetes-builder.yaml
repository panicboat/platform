name: 'Reusable - Kubernetes Builder'

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Service name for identification'
      environment:
        required: true
        type: string
        description: 'Target environment (e.g., local)'
      app-id:
        required: true
        type: string
        description: 'GitHub App ID for authentication'
    secrets:
      private-key:
        required: true
        description: 'GitHub App private key for authentication'

jobs:
  kustomize-diff:
    name: 'Kustomize Diff'
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Kustomize Diff
        uses: panicboat/panicboat-actions/kustomize-diff@15cc90e2df559abd60851d45ac38f001645983e6 # main
        with:
          token: ${{ steps.app-token.outputs.token }}
          service-name: ${{ inputs.service-name }}
          environment: ${{ inputs.environment }}
          path: kubernetes/manifests/${{ inputs.environment }}/${{ inputs.service-name }}
          pr-number: ${{ steps.pr-info.outputs.number }}
