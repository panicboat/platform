name: 'Auto Label - Label Dispatcher'

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  dispatch-labels:
    name: 'Dispatch Labels'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Dispatch Labels
        uses: panicboat/deploy-actions/label-dispatcher@48313d4c25a63d2020345e695f68da376d8b9cde # v1.2.0
        with:
          pr-number: ${{ steps.pr-info.outputs.number }}
          repository: ${{ github.repository }}
          github-token: ${{ steps.app-token.outputs.token }}
          config-path: 'workflow-config.yaml'
