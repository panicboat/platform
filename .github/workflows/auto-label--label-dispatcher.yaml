name: 'Auto Label - Label Dispatcher'

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  dispatch-labels:
    name: 'Dispatch Labels'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get PR information
        id: pr-info
        uses: jwalton/gh-find-current-pr@f3d61b485d2801773f7a07b2aaa3306bd8f8e653 # v1.3.5
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          state: all
        continue-on-error: true

      - name: Dispatch Labels
        uses: panicboat/deploy-actions/label-dispatcher@3399490d98d6e4d4ff1a06badfd63d9f9a0c8699 # v1.1.0
        with:
          pr-number: ${{ steps.pr-info.outputs.number }}
          repository: ${{ github.repository }}
          github-token: ${{ steps.app-token.outputs.token }}
          config-path: 'workflow-config.yaml'
